name: GirlLife Localization Build

on:
  workflow_dispatch:
    inputs:
      force_source:
        description: Force refresh source archive
        required: false
        default: false
        type: boolean
      force_paratranz:
        description: Force refresh ParaTranz export
        required: false
        default: false
        type: boolean
      precheck_mode:
        description: Precheck mode
        required: false
        default: fast
        type: choice
        options:
          - fast
          - balanced
          - strict
  schedule:
    - cron: "30 12 * * 1"
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"
  PROJECT_LANGUAGE: "zh_cn"
  PARATRANZ_TOKEN: ${{ secrets.PARATRANZ_TOKEN }}
  PARATRANZ_PROJECT_ID: ${{ secrets.PARATRANZ_PROJECT_ID }}

jobs:
  build:
    name: GirlLife Build
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run localization pipeline
        env:
          INPUT_FORCE_SOURCE: ${{ inputs.force_source }}
          INPUT_FORCE_PARATRANZ: ${{ inputs.force_paratranz }}
          INPUT_PRECHECK_MODE: ${{ inputs.precheck_mode }}
        run: |
          $args = @('main.py', '--progress', '--build-game')

          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            if ($env:INPUT_FORCE_SOURCE -eq 'true') {
              $args += '--force-source'
            }
            if ($env:INPUT_FORCE_PARATRANZ -eq 'true') {
              $args += '--force-paratranz'
            }
            if ($env:INPUT_PRECHECK_MODE) {
              $args += @('--precheck-mode', $env:INPUT_PRECHECK_MODE)
            }
          }

          if (-not ($args -contains '--precheck-mode')) {
            $args += @('--precheck-mode', 'fast')
          }

          python @args

      - name: Upload build artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: girllife-build
          path: build/**
          if-no-files-found: warn
          retention-days: 7

      - name: Upload translated qsrc
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: girllife-source-translated
          path: data/3-SourceTranslatedFile/**
          if-no-files-found: warn
          retention-days: 7
